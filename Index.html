// Arc Reactor Powerup: synthetisierter Ton wie im Iron Man Film
function playArcReactorBoot(ctx) {
if (!ctx) return;
const t = ctx.currentTime;

// 1. Tiefes Brummen – Reactor startet (Low rumble)
const rumble = ctx.createOscillator();
const rumbleGain = ctx.createGain();
rumble.type = “sawtooth”;
rumble.frequency.setValueAtTime(40, t);
rumble.frequency.linearRampToValueAtTime(80, t + 1.2);
rumbleGain.gain.setValueAtTime(0, t);
rumbleGain.gain.linearRampToValueAtTime(0.18, t + 0.3);
rumbleGain.gain.linearRampToValueAtTime(0.08, t + 1.8);
rumbleGain.gain.linearRampToValueAtTime(0, t + 2.5);
rumble.connect(rumbleGain);
rumbleGain.connect(ctx.destination);
rumble.start(t); rumble.stop(t + 2.5);

// 2. Energie-Aufbau Sweep (capacitor charge whine)
const sweep = ctx.createOscillator();
const sweepGain = ctx.createGain();
sweep.type = “sine”;
sweep.frequency.setValueAtTime(200, t + 0.2);
sweep.frequency.exponentialRampToValueAtTime(2400, t + 1.6);
sweepGain.gain.setValueAtTime(0, t + 0.2);
sweepGain.gain.linearRampToValueAtTime(0.12, t + 0.5);
sweepGain.gain.linearRampToValueAtTime(0.22, t + 1.4);
sweepGain.gain.linearRampToValueAtTime(0, t + 1.9);
sweep.connect(sweepGain);
sweepGain.connect(ctx.destination);
sweep.start(t + 0.2); sweep.stop(t + 1.9);

// 3. Power-ON Klick/Impuls
const impulse = ctx.createOscillator();
const impulseGain = ctx.createGain();
impulse.type = “square”;
impulse.frequency.setValueAtTime(180, t + 1.65);
impulse.frequency.linearRampToValueAtTime(60, t + 2.0);
impulseGain.gain.setValueAtTime(0.35, t + 1.65);
impulseGain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
impulse.connect(impulseGain);
impulseGain.connect(ctx.destination);
impulse.start(t + 1.65); impulse.stop(t + 2.0);

// 4. Stabiles Arc-Hummen (reactor running)
const hum = ctx.createOscillator();
const humGain = ctx.createGain();
hum.type = “sine”;
hum.frequency.setValueAtTime(120, t + 1.9);
humGain.gain.setValueAtTime(0, t + 1.9);
humGain.gain.linearRampToValueAtTime(0.07, t + 2.3);
hum.connect(humGain);
humGain.connect(ctx.destination);
hum.start(t + 1.9); hum.stop(t + 4.5);

// 5. Hi-freq digitaler Scan-Ton (JARVIS aktiviert sich)
const scan = ctx.createOscillator();
const scanGain = ctx.createGain();
scan.type = “triangle”;
scan.frequency.setValueAtTime(880, t + 2.0);
scan.frequency.setValueAtTime(1320, t + 2.15);
scan.frequency.setValueAtTime(660, t + 2.3);
scan.frequency.setValueAtTime(1760, t + 2.45);
scanGain.gain.setValueAtTime(0, t + 2.0);
scanGain.gain.linearRampToValueAtTime(0.08, t + 2.05);
scanGain.gain.setValueAtTime(0.08, t + 2.55);
scanGain.gain.linearRampToValueAtTime(0, t + 2.7);
scan.connect(scanGain);
scanGain.connect(ctx.destination);
scan.start(t + 2.0); scan.stop(t + 2.7);
}

function playBeep(ctx, freq, dur, vol) {
if (!ctx) return;
const osc = ctx.createOscillator();
const g = ctx.createGain();
osc.type = “sine”;
osc.frequency.value = freq;
g.gain.setValueAtTime(vol || 0.06, ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
osc.connect(g); g.connect(ctx.destination);
osc.start(); osc.stop(ctx.currentTime + dur);
}

function speak(text) {
if (!window.speechSynthesis) return;
window.speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text.replace(/[%█◈✓·•]/g, “”));
const vs = window.speechSynthesis.getVoices();
const v = vs.find(x => /en.GB/i.test(x.lang)) || vs.find(x => /en/i.test(x.lang)) || vs[0];
if (v) u.voice = v;
u.rate = 1.5; u.pitch = 0.75; u.volume = 0.85;
window.speechSynthesis.speak(u);
}

function ArcReactor({ size }) {
const s = size || 80;
const cx = s / 2, cy = s / 2, sc = s / 120;
const segs = [0,60,120,180,240,300].map(deg => {
const r = deg * Math.PI / 180;
const x1 = cx + 44*sc*Math.cos(r), y1 = cy + 44*sc*Math.sin(r);
const x2 = cx + 27*sc*Math.cos(r+0.38), y2 = cy + 27*sc*Math.sin(r+0.38);
const x3 = cx + 27*sc*Math.cos(r-0.38), y3 = cy + 27*sc*Math.sin(r-0.38);
return `${x1},${y1} ${x2},${y2} ${x3},${y3}`;
});
const hex = `${cx},${cy-s*0.14} ${cx+s*0.11},${cy-s*0.07} ${cx+s*0.11},${cy+s*0.07} ${cx},${cy+s*0.14} ${cx-s*0.11},${cy+s*0.07} ${cx-s*0.11},${cy-s*0.07}`;
return (
<svg width={s} height={s} viewBox={“0 0 “ + s + “ “ + s} style={{filter:“drop-shadow(0 0 12px #00d4ff) drop-shadow(0 0 28px #0088cc)”,flexShrink:0}}>
<defs>
<radialGradient id="ag1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stopColor="#ffffff"/>
<stop offset="35%" stopColor="#a0f0ff"/>
<stop offset="75%" stopColor="#00aaff" stopOpacity="0.9"/>
<stop offset="100%" stopColor="#003366" stopOpacity="0.3"/>
</radialGradient>
<radialGradient id="ag2" cx="50%" cy="50%" r="50%">
<stop offset="0%" stopColor="#00d4ff" stopOpacity="0.2"/>
<stop offset="100%" stopColor="#00d4ff" stopOpacity="0"/>
</radialGradient>
</defs>
<circle cx={cx} cy={cy} r={s*0.48} fill="url(#ag2)"/>
<circle cx={cx} cy={cy} r={s*0.46} fill=“none” stroke=”#00d4ff” strokeWidth={s*0.007} strokeOpacity=“0.25” strokeDasharray=“3 4” style={{animation:“arcSpin 22s linear infinite”,transformOrigin:cx+“px “+cy+“px”}}/>
<circle cx={cx} cy={cy} r={s*0.41} fill="none" stroke="#00aaff" strokeWidth={s*0.01} strokeOpacity="0.4"/>
{segs.map((pts,i) => <polygon key={i} points={pts} fill="#00aaff" fillOpacity="0.12" stroke="#00d4ff" strokeWidth="0.5" strokeOpacity="0.5"/>)}
<circle cx={cx} cy={cy} r={s*0.225} fill=“none” stroke=”#00d4ff” strokeWidth={s*0.011} strokeOpacity=“0.6” style={{animation:“arcSpinR 9s linear infinite”,transformOrigin:cx+“px “+cy+“px”}}/>
<polygon points={hex} fill=“none” stroke=”#00d4ff” strokeWidth={s*0.008} strokeOpacity=“0.35” style={{animation:“arcSpin 14s linear infinite”,transformOrigin:cx+“px “+cy+“px”}}/>
<circle cx={cx} cy={cy} r={s*0.13} fill=“url(#ag1)” style={{animation:“arcPulse 2.2s ease-in-out infinite”}}/>
<circle cx={cx} cy={cy} r={s*0.043} fill="white" fillOpacity="0.95"/>
</svg>
);
}

async function analyseJobs(list) {
setLoadingJobs(true);
const prompt = “Du bist JARVIS. Bewerte diese Stellen fuer den Kandidaten mit Match-Score 0-100.\nKANDIDAT: “ + REMO.name + “, “ + REMO.titel + “, “ + REMO.erfahrung + “ Jahre\nSKILLS: “ + REMO.skills.join(”, “) + “\nCV: “ + REMO.cv + “\nSTELLEN: “ + list.map(j => “ID” + j.id + “: “ + j.title + “ bei “ + j.company + “ [” + j.tags.join(”,”) + “]”).join(” | “) + “\nAntworte NUR mit JSON ohne Markdown: [{"id":1,"match":92,"grund":"ein Satz"},…]”;
try {
const res = await fetch(“https://api.anthropic.com/v1/messages”, { method:“POST”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify({ model:“claude-sonnet-4-20250514”, max_tokens:800, messages:[{role:“user”,content:prompt}] }) });
const data = await res.json();
const raw = (data.content && data.content[0] && data.content[0].text) || “[]”;
const scores = JSON.parse(raw.replace(/`json|`/g, “”).trim());
return list.map(j => { const s = scores.find(x => x.id === j.id); return Object.assign({}, j, { match: s ? s.match : Math.floor(72 + Math.random()*18), grund: s ? s.grund : “” }); }).sort((a,b) => b.match - a.match);
} catch(e) {
return list.map(j => Object.assign({}, j, { match: Math.floor(70 + Math.random()*20), grund: “” }));
} finally { setLoadingJobs(false); }
}
